{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Edit Product | Organic HubX</title>
    <link rel="stylesheet" href="{% static 'website/css/style.css' %}">
    <link rel="stylesheet" href="{% static 'website/css/edit_product.css' %}">
</head>
<body>
<header>
        <div class="container">
            <div class="header-wrap">
                <div class="logo">
                    <a href="{% url 'home' %}">
                        <img src="{% static 'website/images/Yellow_logo.png' %}" alt="Organic HubX" width="120">
                    </a>
                </div>
                <nav class="menu">
                    <ul class="nav-links">
                        <li><a href="{% url 'home' %}">Home</a></li>
                        <li><a href="{% url 'about' %}">About</a></li>
                        <li><a href="{% url 'products' %}">Products</a></li>
                        <li><a href="{% url 'contact' %}">Contact</a></li>
                        <li><a href="{% url 'login' %}">Login</a></li>
                    </ul>
                    {% if user.is_authenticated %}
                    <div class="profile-icon" onclick="toggleSidebar()">
                        <img src="{% static 'website/images/profile.png' %}" alt="Profile">
                    </div>
                    {% endif %}

                </nav>
            </div>
        </div>
    </header>
<div class="edit-container">
    <h2>Edit Product</h2>

    <form method="POST" enctype="multipart/form-data" class="edit-form">
        {% csrf_token %}

        <input type="text" name="name" value="{{ product.name }}" required>
        <textarea name="description" required>{{ product.description }}</textarea>
        <input type="number" name="price" value="{{ product.price }}" required>
        <input type="number" name="quantity" value="{{ product.quantity }}" required>

        <select name="unit" required>
            <option value="{{ product.unit }}" selected>{{ product.unit }}</option>
            <option value="kg">kg</option>
            <option value="g">g</option>
            <option value="l">l</option>
            <option value="ml">ml</option>
            <option value="unit">unit</option>
        </select>

        <input type="file" name="image">

        <div class="form-actions">
            <button type="submit" class="btn btn-update">Update</button>
            <a href="{% url 'farmer_dashboard' %}" class="btn btn-cancel">Cancel</a>
        </div>
    </form>
</div>

</body>
</html>
